name: Lint

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run check:routes
      - name: actionlint
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color
