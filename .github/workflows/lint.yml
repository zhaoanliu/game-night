name: Lint

on:
  pull_request:
  workflow_call:

concurrency:
  group: ${{ format('{0}-lint', github.event_name == 'pull_request' && github.ref || github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Gate job, not paths-ignore: a never-triggered workflow leaves required
  # checks stuck "pending", while a skipped job satisfies them.
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.detect.outputs.skip }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: zhaoanliu/claude-dev-automation/actions/detect-doc-only@v2.0.0
        id: detect

  lint:
    needs: detect-changes
    if: needs.detect-changes.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run check:routes
      - name: actionlint
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color
      - name: Dispatch ci-failure for auto-fix
        if: failure()
        uses: zhaoanliu/claude-dev-automation/actions/trigger-ci-failure@v2.0.0
        with:
          gh-pat: ${{ secrets.GH_PAT }}
