name: E2E

on:
  pull_request:
  workflow_call:

concurrency:
  group: ${{ format('{0}-e2e', github.event_name == 'pull_request' && github.ref || github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Gate job, not paths-ignore: a never-triggered workflow leaves required
  # checks stuck "pending", while a skipped job satisfies them.
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.detect.outputs.skip }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: zhaoanliu/claude-dev-automation/actions/detect-doc-only@v2.0.0
        id: detect

  # The full suite against a production build (playwright.config.local.ts):
  # dev servers hide SSR/hydration and chunk-isolation bugs. global-setup
  # resets the database; the webServer config builds and starts the app.
  e2e:
    needs: detect-changes
    if: needs.detect-changes.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx supabase start
      - run: node scripts/setup-env.mjs
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test -c playwright.config.local.ts
        env:
          CI: "true"
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - name: Dispatch ci-failure for auto-fix
        if: failure()
        uses: zhaoanliu/claude-dev-automation/actions/trigger-ci-failure@v2.0.0
        with:
          gh-pat: ${{ secrets.GH_PAT }}
