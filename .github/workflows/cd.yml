name: CD

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'doc/**'
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  issues: write

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  lint:
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  test:
    uses: ./.github/workflows/test.yml
    secrets: inherit

  e2e:
    uses: ./.github/workflows/e2e.yml
    secrets: inherit

  deploy:
    needs: [lint, test, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Migrations run before the deploy: a migration that fails here blocks
      # the deploy entirely (the app never sees a schema it doesn't expect).
      - name: Apply migrations
        id: apply-migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          npx supabase link --project-ref sklnkdgjawuromzsxuok --password ""
          npx supabase db push --password ""

      - name: Deploy to Vercel
        id: deploy-vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: |
          set -o pipefail
          npx vercel deploy --prod --token="${VERCEL_TOKEN}" 2>&1 | tee /tmp/vercel_output.txt

      # The S1/S2 contract, proven against the live deployment: take the last
      # seat on the near-full seeded event (201), retry idempotently (200),
      # bounce off the full event (409), then cancel to restore the seed (200).
      - name: Hosted smoke — RSVP round-trip
        id: smoke
        run: |
          U="https://game-night-livid.vercel.app"
          J=$(mktemp)
          FNM="11111111-1111-1111-1111-111111110001"   # seeded: 1 seat left
          POD="11111111-1111-1111-1111-111111110002"   # seeded: full
          YUKI="33333333-3333-3333-3333-333333330012"  # seeded: holds no RSVPs

          check() {
            local expect="$1"; shift
            local got
            got=$(curl -s -o /dev/null -w '%{http_code}' "$@")
            if [[ "$got" != "$expect" ]]; then
              echo "SMOKE FAIL: expected $expect got $got for: $*"
              exit 1
            fi
          }

          check 200 -c "$J" -X POST "$U/api/session" -H 'content-type: application/json' -d "{\"userId\":\"$YUKI\"}"
          check 201 -b "$J" -X POST "$U/api/events/$FNM/rsvp"
          check 200 -b "$J" -X POST "$U/api/events/$FNM/rsvp"
          check 409 -b "$J" -X POST "$U/api/events/$POD/rsvp"
          check 200 -b "$J" -X DELETE "$U/api/events/$FNM/rsvp"
          echo "Hosted smoke passed: 201 confirmed / 200 already_rsvpd / 409 event_full / 200 cancelled"

      - name: Close open CD failure issues on successful deploy
        if: steps.smoke.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          OPEN_ISSUES=$(gh issue list \
            --state open \
            --limit 50 \
            --json number,title \
            | jq -r '.[] | select(.title | startswith("CD failure:")) | .number')
          if [[ -n "$OPEN_ISSUES" ]]; then
            while IFS= read -r NUM; do
              gh issue comment "$NUM" \
                --body "Production deployment of \`${SHORT_SHA}\` succeeded (hosted smoke passed). Auto-closing."
              gh issue close "$NUM"
            done <<< "$OPEN_ISSUES"
          fi

      - name: Trigger db-fix on migration failure
        if: failure() && steps.apply-migrations.outcome == 'failure' && github.event_name != 'repository_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          jq -n \
            --arg id "${{ github.run_id }}" \
            --arg url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{"event_type":"db-failure","client_payload":{"run_id":$id,"run_url":$url}}' \
          | gh api repos/${{ github.repository }}/dispatches --method POST --input -

      - name: Trigger cd-auto-fix on non-migration deploy failure
        if: failure() && steps.apply-migrations.outcome != 'failure' && github.event_name != 'repository_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VERCEL_ERR=$(tail -30 /tmp/vercel_output.txt 2>/dev/null | head -c 800 || true)
          jq -n \
            --arg sha "${{ github.sha }}" \
            --arg url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg err "$VERCEL_ERR" \
            '{"event_type":"cd-failure","client_payload":{"sha":$sha,"deployment_url":$url,"vercel_error":$err}}' \
          | gh api repos/${{ github.repository }}/dispatches --method POST --input -
